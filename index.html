<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>

        body {
            background: linear-gradient(135deg, #33658a, #86bbd8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: rgba(6, 46, 78, 0.151);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>


<div class="login-card">
    <h2 class="text-center mb-5">Login</h2>

    
    <form action="#" method="POST">

        <div class="form-floating mb-4">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="Enter Email Address" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control form-control-lg is-invalid text-dark" id="passwordInput" placeholder="Enter Password" value="qwertyuioasdfghjkzxcvbn">
            <div class="invalid-feedback text-warning fw-bold">
                Invalid password! Please try again.
            </div>

        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                keep me Logged in on This Device.
            </label>
        </div>

        <ul>
            <li>
                <a href="Registration.html" class="text-warning">Don't have an account? Register here.</a>
            </li>
        </ul>

        <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Log In</button>
        
    </form>
</div>


</body>
</html>
